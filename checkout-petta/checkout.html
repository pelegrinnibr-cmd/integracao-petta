<!DOCTYPE html>
<html>
<head>
  <title>Checkout Petta</title>
  <meta charset="UTF-8">
</head>
<body style="font-family: Arial; padding: 30px;">

<h2>Checkout</h2>

<input id="name" placeholder="Nome"><br><br>
<input id="email" placeholder="Email"><br><br>

<select id="method">
  <option value="PIX">PIX</option>
  <option value="CREDIT_CARD">Cartão</option>
</select><br><br>

<button onclick="enviar()">Finalizar compra</button>

<h3>Resposta:</h3>
<pre id="res"></pre>

<script>
async function enviar() {
  try {
    const response = await fetch('https://integracao-petta.onrender.com/checkout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        amount: 10000,
        method: document.getElementById('method').value,
        customer: {
          name: document.getElementById('name').value,
          email: document.getElementById('email').value
        }
      })
    });

    const data = await response.json();
    document.getElementById('res').innerText = JSON.stringify(data, null, 2);

  } catch (error) {
    document.getElementById('res').innerText = "Erro: " + error;
  }
}
</script>

</body>
</html>
